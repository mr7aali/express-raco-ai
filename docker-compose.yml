services:
  backend:
    build:
      context: .
    container_name: express_raco_ai_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ecommerce_payment_db?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-this-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_your_stripe_secret_key}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_your_stripe_webhook_secret}
      BKASH_BASE_URL: ${BKASH_BASE_URL:-https://tokenized.sandbox.bka.sh/v1.2.0-beta}
      BKASH_APP_KEY: ${BKASH_APP_KEY:-your_bkash_app_key}
      BKASH_APP_SECRET: ${BKASH_APP_SECRET:-your_bkash_app_secret}
      BKASH_USERNAME: ${BKASH_USERNAME:-your_bkash_username}
      BKASH_PASSWORD: ${BKASH_PASSWORD:-your_bkash_password}
      BKASH_CALLBACK_URL: ${BKASH_CALLBACK_URL:-http://localhost:5000/api/payments/bkash/callback}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    container_name: express_raco_ai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecommerce_payment_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecommerce_payment_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: express_raco_ai_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
